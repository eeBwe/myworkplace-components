<div class="container py-4 gloss-style-container">
  <div class="d-flex align-items-center justify-content-between mb-3">
    <h2 class="gloss-style-title m-0">The Gordon Glossary</h2>
    <div class="d-flex">
      <button
        id="btnSurprise"
        class="btn btn-outline-primary mr-2"
        type="button"
        aria-label="Surprise me term"
      >
        🎲 Surprise Me!
      </button>
      <button
        id="btnReset"
        class="btn btn-outline-secondary"
        type="button"
        aria-label="Reset filters"
      >
        Reset
      </button>
    </div>
  </div>

  <!-- Controls -->
  <div class="row mb-3">
    <div class="col-12 col-lg-6">
      <label for="searchInput" class="gloss-style-label mb-1">Search</label>
      <input
        id="searchInput"
        class="form-control"
        type="text"
        placeholder="Type to filter by term, acronym, or text…"
        aria-describedby="searchHelp"
      />
      <small id="searchHelp" class="form-text text-muted"
        >Matches term name, acronym, or any text in the definition.</small
      >
    </div>
    <div class="col-12 col-lg-6">
      <label class="gloss-style-label mb-1">Category</label>
      <select id="categorySelect" class="form-control">
        <option value="">All categories</option>
        <option value="Safety">Safety</option>
        <option value="HR">HR</option>
        <option value="Campus">Campus</option>
        <option value="Learning">Learning</option>
        <option value="Governance">Governance</option>
        <option value="Environment">Environment</option>
        <option value="Student Services">Student Services</option>
        <option value="Facilities">Facilities</option>
      </select>
    </div>
  </div>

  <!-- A–Z Navigation -->
  <div
    class="alpha-nav d-flex flex-wrap mb-3 gloss-style-alpha-nav"
    role="navigation"
    aria-label="Glossary alphabet navigation"
  >
    <!-- buttons generated by JS -->
  </div>

  <div class="gloss-style-divider"></div>

  <!-- Scrollable Glossary panel -->
  <div class="gloss-style-scroll">
    <div id="glossaryList" class="d-flex flex-column">
      <!-- items generated by JS -->
    </div>
  </div>

  <div class="gloss-style-divider"></div>

  <p class="text-muted mt-3">
    Tip: hover over
    <span class="gloss-style-hint" title="Short definition"
      >underlined acronyms</span
    >
    to see quick meanings.
  </p>
</div>

<!-- Awards banner (no BS5 toasts) -->
<div id="awardToast" class="gloss-style-award-toast">
  <div class="card shadow-sm">
    <div class="card-body p-3">
      <div class="d-flex align-items-start">
        <div class="mr-2">🏅</div>
        <div>
          <div id="awardTitle" class="font-weight-bold">
            Bronze Curious Badge
          </div>
          <div id="awardMsg" class="text-muted small">
            You’ve opened 5 glossary entries. Curiosity suits you!
          </div>
        </div>
      </div>
      <div class="text-right mt-2">
        <button
          class="btn btn-sm btn-outline-secondary"
          onclick="document.getElementById('awardToast').style.display = 'none'"
        >
          Dismiss
        </button>
      </div>
    </div>
  </div>
</div>

<!-- App + Namespaced style injection -->
<script>
  (function () {
    // ----- 1) Inject styles (idempotent, isolated) -----
    if (!document.getElementById("glossary-styles")) {
      var style = document.createElement("style");
      style.id = "glossary-styles";
      style.innerHTML = `

    /* Brand color variables (scoped via classes, not :root, to avoid LMS overrides) */
    .gloss-style-container { background:#f8fafc; }
    .gloss-style-title { font-weight:700; letter-spacing:.3px; }

    /* Panel with internal scrollbar (~5 entries) */
    .gloss-style-scroll {
      max-height: 520px; /* adjust to perfectly fit your dashboard column */
      overflow-y: auto;
      border: 1px solid #e5e7eb;
      border-radius: .5rem;
      background: #fff;
      padding: .75rem;
    }

    /* Card styling */
    .gloss-style-term-card {
      border-left: .25rem solid #307FE2; /* default blue */
      background:#fff; border-radius:.5rem;
      box-shadow:0 1px 2px rgba(0,0,0,.06);
    }
    .gloss-style-term { font-weight:600; }
    .gloss-style-definition { color:#3b3b3b; }
    .gloss-style-meta { font-size:.85rem; color:#6c757d; }

    /* Border color variants (The Gordon brand) */
    .gloss-style-border-blue   { border-left-color: #307FE2 !important; } /* We Are The Gordon */
    .gloss-style-border-green  { border-left-color: #84BD00 !important; } /* We bring our best */
    .gloss-style-border-purple { border-left-color: #9E007E !important; } /* We create the future */
    .gloss-style-border-orange { border-left-color: #DC582A !important; } /* We are student minded */

    /* A–Z nav + separators */
    .gloss-style-alpha-nav .btn { padding: .25rem .5rem; margin:.1rem; }
    .gloss-style-divider { border-top:1px dashed #e3e6ea; margin:1rem 0; }

    /* Acronym hint underline */
    .gloss-style-hint { border-bottom:1px dotted #6c757d; cursor:help; }

    /* Simple category icon */
    .gloss-style-cat-icon {
      display:inline-flex; align-items:center; justify-content:center;
      width:1.6rem; height:1.6rem; border-radius:50%;
      background:#e9f2ff; color:#007bff; font-size:.95rem; margin-right:.4rem;
    }

    /* Awards banner */
    .gloss-style-award-toast {
      position: fixed;
      right: 1rem;
      bottom: 1rem;
      z-index: 1060;
      min-width: 260px;
      display: none;
    }

    /* Labels (minor typography) */
    .gloss-style-label { font-weight:600; }
  `;
      document.head.appendChild(style);
    }

    // ----- 2) Find root (DO NOT put this inside the style guard) -----
    var root =
      document.querySelector("#bw-glossary .gloss-style-container") ||
      document.querySelector(".gloss-style-container");

    if (!root) {
      console.warn("Glossary root not found");
      return;
    }

    // ----- 3) Everything below ALWAYS runs once root exists -----
    var listEl = root.querySelector("#glossaryList");
    var alphaNavEl = root.querySelector(".gloss-style-alpha-nav");
    var searchInput = root.querySelector("#searchInput");
    var catSelect = root.querySelector("#categorySelect");
    var btnSurprise = root.querySelector("#btnSurprise");
    var btnReset = root.querySelector("#btnReset");
    var awardToast = root.querySelector("#awardToast");
    var awardTitle = root.querySelector("#awardTitle");
    var awardMsg = root.querySelector("#awardMsg");

    var LETTERS = Array.from(
      new Set(
        GLOSSARY.map(function (x) {
          return x.letter;
        }),
      ),
    ).sort();

    // Category-to-border mapping (namespaced classes)
    var CATEGORY_BORDER = {
      Safety: "gloss-style-border-orange",
      HR: "gloss-style-border-green",
      Campus: "gloss-style-border-purple",
      Learning: "gloss-style-border-blue",
      Governance: "gloss-style-border-blue",
      Environment: "gloss-style-border-green",
      "Student Services": "gloss-style-border-orange",
      Facilities: "gloss-style-border-purple",
    };

    // Awards tracking
    var openedCount = 0;
    var bronzeAwarded = false;
    var silverAwarded = false;
    var goldAwarded = false;

    // ----- 3) A–Z nav -----
    LETTERS.forEach(function (letter) {
      var btn = document.createElement("button");
      btn.className = "btn btn-sm btn-outline-secondary";
      btn.textContent = letter;
      btn.setAttribute("aria-label", "Jump to " + letter);
      btn.addEventListener("click", function () {
        jumpToLetter(letter);
      });
      alphaNavEl.appendChild(btn);
    });

    // ----- 4) Rendering -----
    var currentData = GLOSSARY.slice().sort(function (a, b) {
      return a.term.localeCompare(b.term);
    });

    function borderForItem(item) {
      return (
        item.border ||
        CATEGORY_BORDER[item.category] ||
        "gloss-style-border-blue"
      );
    }

    function render(data) {
      listEl.innerHTML = "";
      data.forEach(function (item) {
        var borderClass = borderForItem(item);

        var card = document.createElement("div");
        card.className = "gloss-style-term-card p-3 mb-3 " + borderClass;
        card.setAttribute("data-letter", item.letter);
        card.setAttribute("data-category", item.category);
        card.setAttribute(
          "data-tags",
          (item.tags || []).join(",").toLowerCase(),
        );

        var titleRow = document.createElement("div");
        titleRow.className =
          "d-flex align-items-center justify-content-between";

        var left = document.createElement("div");
        left.className = "d-flex align-items-center";

        var icon = document.createElement("span");
        icon.className = "gloss-style-cat-icon";
        icon.textContent = item.category ? item.category.charAt(0) : "?";
        icon.setAttribute("aria-hidden", "true");

        var termEl = document.createElement("div");
        termEl.className = "ml-2";
        termEl.innerHTML =
          '<div class="gloss-style-term">' +
          item.term +
          (item.acronym
            ? ' <span class="gloss-style-hint" title="' +
              escapeHtml(item.definition) +
              '">' +
              item.acronym +
              "</span>"
            : "") +
          "</div>" +
          '<div class="gloss-style-meta">' +
          '<span class="mr-2">Category: ' +
          (item.category || "—") +
          "</span>" +
          '<span class="badge badge-light">Letter: ' +
          item.letter +
          "</span>" +
          "</div>";

        left.appendChild(icon);
        left.appendChild(termEl);

        var right = document.createElement("div");
        var btn = document.createElement("button");
        btn.className = "btn btn-sm btn-outline-primary";
        btn.textContent = "View";
        btn.setAttribute("aria-expanded", "false");

        btn.addEventListener("click", function () {
          const expanded = btn.getAttribute("aria-expanded") === "true";

          if (expanded) {
            closeCard(card, btn);
          } else {
            openOnlyThis(card, btn);
          }
        });

        right.appendChild(btn);

        titleRow.appendChild(left);
        titleRow.appendChild(right);

        var def = document.createElement("div");
        def.className = "gloss-style-definition mt-2 collapse";
        def.textContent = item.definition;

        card.appendChild(titleRow);
        card.appendChild(def);

        listEl.appendChild(card);
      });
    }

    // ----- 5) Single-open + focus management -----

    function openOnlyThis(card, btn) {
      closeAll();

      const def = card.querySelector(".gloss-style-definition");
      def.style.display = "block";
      def.classList.add("show");

      btn.textContent = "Hide";
      btn.setAttribute("aria-expanded", "true");
      btn.focus();

      incrementOpened();
    }

    function closeAll() {
      var defs = listEl.querySelectorAll(".gloss-style-definition.show");
      defs.forEach(function (el) {
        el.classList.remove("show");
        el.style.display = "none";
      });

      listEl
        .querySelectorAll('.btn[aria-expanded="true"]')
        .forEach(function (b) {
          b.textContent = "View";
          b.setAttribute("aria-expanded", "false");
        });
    }

    function closeCard(card, btn) {
      const def = card.querySelector(".gloss-style-definition");

      def.classList.remove("show");
      def.style.display = "none";

      btn.textContent = "View";
      btn.setAttribute("aria-expanded", "false");
    }

    function escapeHtml(raw) {
      return raw.replace(/[&<>"']/g, function (m) {
        return {
          "&": "&amp;",
          "<": "&lt;",
          ">": "&gt;",
          '"': "&quot;",
          "'": "&#39;",
        }[m];
      });
    }

    // ----- 6) Filtering -----
    function applyFilters() {
      var q = (searchInput.value || "").trim().toLowerCase();
      var cat = catSelect.value;

      var filtered = GLOSSARY.filter(function (item) {
        var hay = (
          item.term +
          " " +
          (item.acronym || "") +
          " " +
          item.definition +
          " " +
          (item.tags || []).join(" ")
        ).toLowerCase();
        var matchQ = !q || hay.indexOf(q) >= 0;
        var matchCat = !cat || item.category === cat;
        return matchQ && matchCat;
      }).sort(function (a, b) {
        return a.term.localeCompare(b.term);
      });

      currentData = filtered;
      render(currentData);
      closeAll();
    }

    // ----- 7) A–Z jump (scroll inside panel; optional open-first behavior) -----
    function jumpToLetter(letter) {
      var cards = Array.from(listEl.querySelectorAll(".gloss-style-term-card"));
      var target = cards.find(function (el) {
        return el.getAttribute("data-letter") === letter;
      });
      if (target) {
        target.scrollIntoView({ behavior: "smooth", block: "start" });
        // If you want it to auto-open when jumped, uncomment below:
        // var btn = target.querySelector('button.btn-outline-primary');
        // if (btn) openOnlyThis(target, btn);

        target.classList.add("border", "border-2", "border-primary");
        setTimeout(function () {
          target.classList.remove("border", "border-2", "border-primary");
        }, 1200);
      }
    }

    // ----- 8) Surprise Me! -----
    function surprise() {
      if (!currentData.length) return;
      var idx = Math.floor(Math.random() * currentData.length);
      var targetTerm = currentData[idx].term;
      var cards = Array.from(listEl.querySelectorAll(".gloss-style-term-card"));
      var card = cards.find(function (c) {
        var name = c.querySelector(".gloss-style-term").textContent.trim();
        return name.indexOf(targetTerm) === 0;
      });
      if (!card) return;
      var btn = card.querySelector("button.btn-outline-primary");
      card.scrollIntoView({ behavior: "smooth", block: "center" });
      openOnlyThis(card, btn);
    }

    // ----- 9) Awards logic: 5 (Bronze), 10 (Silver), 20 (Gold) -----
    function incrementOpened() {
      openedCount++;
      if (openedCount >= 20 && !goldAwarded) {
        goldAwarded = true;
        showAward(
          "Gold Legendary‑Curious Badge",
          "20 entries explored—magnificent dedication!",
        );
      } else if (openedCount >= 10 && !silverAwarded) {
        silverAwarded = true;
        showAward(
          "Silver Super‑Curious Badge",
          "10 entries explored—your curiosity is unstoppable!",
        );
      } else if (openedCount >= 5 && !bronzeAwarded) {
        bronzeAwarded = true;
        showAward(
          "Bronze Curious Badge",
          "You’ve opened 5 glossary entries. Curiosity suits you!",
        );
      }
    }

    function showAward(title, msg) {
      awardTitle.textContent = title;
      awardMsg.textContent = msg;
      awardToast.style.display = "block";
      setTimeout(function () {
        awardToast.style.display = "none";
      }, 6000);
    }

    // ----- 10) Events -----
    searchInput.addEventListener("keyup", applyFilters);
    catSelect.addEventListener("change", applyFilters);
    btnSurprise.addEventListener("click", surprise);
    btnReset.addEventListener("click", function () {
      searchInput.value = "";
      catSelect.value = "";
      openedCount = 0;
      bronzeAwarded = false;
      silverAwarded = false;
      goldAwarded = false;
      applyFilters();
      root.querySelector(".gloss-style-scroll").scrollTop = 0;
    });

    // ----- 11) Init -----
    render(currentData);
  })();
</script>
